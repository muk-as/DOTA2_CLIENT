message CMsgEventAction {
	optional uint32 action_id = 1;
	optional uint32 times_completed = 2 [default = 1];
}

message CMsgUserEventPoints {
	optional uint32 account_id = 1;
	optional uint32 event_id = 2;
	optional uint32 total_points = 3;
	optional uint32 total_premium_points = 4;
	optional uint32 points = 5;
	optional uint32 premium_points = 6;
	repeated .CMsgEventAction completed_actions = 7;
	optional bool owned = 8;
	optional uint32 active_season_id = 9;
}
